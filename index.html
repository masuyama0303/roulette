<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日の装備を決めよう！！</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to right,#f59090,#fcd7a1,#fff9b1,#a5d4ad,#a3bce2,#a59aca,#cfa7cd);
            /* background-color: #f0f2f5; */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .roulette-container {
            position: relative;
            width: 380px;
            height: 380px;
            margin: 20px auto;
        }
        /* 物理的に動く矢印（ピン） */
        .pin {
            position: absolute;
            top: -10px;
            left: 50%;
            width: 30px;
            height: 45px;
            /* 回転の軸を上部（根元）に設定して首振りを表現 */
            transform-origin: 50% 10px;
            transform: translateX(-50%) rotate(0deg);
            z-index: 10;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 14px 0;
            width: 240px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255,71,87,0.2);
            transition: all 0.2s;
            margin-top: 25px;
        }
        button:hover { background-color: #ff2a3a; transform: translateY(-1px); }
        button:disabled { background-color: #cccccc; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>今日の装備を決めるルーレット</h1>
    <div class="roulette-container">
        <!-- 矢印をSVGで描画 -->
        <svg class="pin" id="pin" viewBox="0 0 30 45">
            <path d="M15,0 L30,10 L20,10 L20,45 L10,45 L10,10 L0,10 Z" fill="#ff4757"/>
            <circle cx="15" cy="10" r="3" fill="#ffffff"/>
        </svg>
        <canvas id="roulette" width="380" height="380"></canvas>
    </div>
    <button id="spin-btn" onclick="startSpin()" disabled>読み込み中...</button>
</div>

<script>
    // ★ここにGASで発行した「ウェブアプリのURL」を貼り付けてください★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzKK95uNsWvt_QpJzyLFQBKAH1xNuOus-P-nnW5_cERRjkNpC2kaDMIjTvFLF7oTKCC6Q/exec";

    let itemsArray = [];
    let totalWeight = 0;
    const canvas = document.getElementById('roulette');
    const ctx = canvas.getContext('2d');
    const pin = document.getElementById('pin');

    // ルーレットの回転を細かく制御するための変数
    let currentAngle = 0; 
    let isSpinning = false;

    const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#1a535c', '#ff9f43', '#0abde3', '#10ac84', '#ee5253'];

    // 音声を合成して鳴らすためのオーディオコンテキスト
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // 「カチッ」という金属っぽい打撃音をプログラムで合成して鳴らす関数
    function playTickSound() {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        } catch (e) { console.log(e); }
    }

    function loadData() {
        const script = document.createElement('script');
        script.src = `${GAS_URL}`;
        document.body.appendChild(script);
    }

    function callback(data) {
        itemsArray = data.items;
        totalWeight = itemsArray.reduce((sum, item) => sum + item.weight, 0);
        document.getElementById('spin-btn').innerText = "スタート";
        document.getElementById('spin-btn').disabled = false;
        render(); // 初期描画
    }

    // メインの描画処理
    function render() {
        const radius = canvas.width / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(currentAngle); // 現在の回転角度を適用

        let startAngle = 0;

        for (let i = 0; i < itemsArray.length; i++) {
            const arcSize = (itemsArray[i].weight / totalWeight) * (2 * Math.PI);
            
            // 扇形
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, radius - 15, startAngle, startAngle + arcSize);
            ctx.lineTo(0, 0);
            ctx.fill();

            // 文字
            ctx.save();
            ctx.rotate(startAngle + arcSize / 2);
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 16px sans-serif";
            if(colors[i % colors.length] === '#ffe66d') ctx.fillStyle = "#333333";
            let text = itemsArray[i].name.toString();
            if (text.length > 8) text = text.substring(0, 7) + '…';
            ctx.fillText(text, radius - 40, 0);
            ctx.restore();

            // 境界線（釘を打つ位置）に「金属っぽい釘」を描画
            ctx.save();
            ctx.rotate(startAngle);
            
            // 釘の影
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath();
            ctx.arc(radius - 15, 2, 6, 0, 2 * Math.PI);
            ctx.fill();

            // 釘の本体（グラデーションで金属の立体感を演出）
            const pegGrad = ctx.createRadialGradient(radius - 17, -2, 1, radius - 15, 0, 6);
            pegGrad.addColorStop(0, '#ffffff'); // ハイライト
            pegGrad.addColorStop(0.4, '#a0a0a0'); // 金属の地の色
            pegGrad.addColorStop(1, '#404040'); // 縁の影
            ctx.fillStyle = pegGrad;
            ctx.beginPath();
            ctx.arc(radius - 15, 0, 6, 0, 2 * Math.PI);
            ctx.fill();
            ctx.restore();

            startAngle += arcSize;
        }
        ctx.restore();
    }

    function getSecureRandomScore(max) {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return array % max;
    }

    function startSpin() {
        if (isSpinning || itemsArray.length === 0 || totalWeight === 0) return;
        
        initAudio(); 
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        isSpinning = true;

        // 1. 裏側で厳密に当選者を決定
        const randomScore = getSecureRandomScore(totalWeight);
        let winnerIndex = 0;
        let countedWeight = 0;
        for (let i = 0; i < itemsArray.length; i++) {
            countedWeight += itemsArray[i].weight;
            if (randomScore < countedWeight) { winnerIndex = i; break; }
        }

        // 2. 当選マスの角度を割り出す
        let startAngleDegree = 0;
        for (let i = 0; i < winnerIndex; i++) {
            startAngleDegree += (itemsArray[i].weight / totalWeight) * 360;
        }
        const winnerArcSizeDegree = (itemsArray[winnerIndex].weight / totalWeight) * 360;
        const winnerTargetAngleRad = ((270 - (startAngleDegree + winnerArcSizeDegree / 2)) * Math.PI) / 180;

        // 3. 物理回転アニメーションのパラメーター設定
        const startRad = currentAngle % (2 * Math.PI);
        const targetRad = startRad + (5 * 2 * Math.PI) + ((winnerTargetAngleRad - startRad) % (2 * Math.PI));
        
        const duration = 5000; // 5秒間まわす
        const startTime = performance.now();

        // 釘の間隔（ラジアン）のリストを作成
        let pegAngles = [];
        let totalAcc = 0;
        for (let i = 0; i < itemsArray.length; i++) {
            pegAngles.push(totalAcc);
            totalAcc += (itemsArray[i].weight / totalWeight) * (2 * Math.PI);
        }

        let lastPassedPegIndex = -1;

        // 毎フレーム実行されるアニメーションループ
        function animate(now) {
            const elapsed = now - startTime;
            const t = Math.min(elapsed / duration, 1);

            const easeOut = 1 - Math.pow(1 - t, 3);
            currentAngle = startRad + (targetRad - startRad) * easeOut;

            const currentPositionRad = (-currentAngle - Math.PI / 2) % (2 * Math.PI);
            const normalizedPos = currentPositionRad < 0 ? currentPositionRad + 2 * Math.PI : currentPositionRad;

            let closestPegDist = 2 * Math.PI;
            let currentPegIndex = 0;
            for (let i = 0; i < pegAngles.length; i++) {
                let dist = normalizedPos - pegAngles[i];
                if (dist < 0) dist += 2 * Math.PI;
                if (dist < closestPegDist) {
                    closestPegDist = dist;
                    currentPegIndex = i;
                }
            }

            // カチカチ処理
            if (closestPegDist < 0.08) {
                if (lastPassedPegIndex !== currentPegIndex) {
                    playTickSound(); 
                    lastPassedPegIndex = currentPegIndex;
                }
                const tilt = (1 - (closestPegDist / 0.08)) * 25;
                pin.style.transform = `translateX(-50%) rotate(${tilt}deg)`;
            } else {
                pin.style.transform = "translateX(-50%) rotate(0deg)";
            }

            render(); 

            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                btn.disabled = false;
                pin.style.transform = "translateX(-50%) rotate(0deg)";
                setTimeout(() => {
                    alert(おめでとう！ 今日の装備は「 ${itemsArray[winnerIndex].name} 」になりました！);
                }, 200);
            }
        }

        requestAnimationFrame(animate);

    }
    
    loadData();
</script>
</body>
</html>
